<!DOCTYPE html>
<html>
<head>
    <title>Bank Statement Analyzer</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="p-5">
    <h2>Bank Statement Analyzer</h2>

    <form method="POST" enctype="multipart/form-data" class="mb-3">
        <input type="file" name="file" class="form-control mb-2" required>
        <button type="submit" class="btn btn-primary">Upload & Analyze</button>
    </form>

    {% if table %}
    <h4>Summary</h4>
    <div>{{ table|safe }}</div>
    <a href="{{ url_for('download_file') }}" class="btn btn-success mt-3">Download Excel Report</a>
    {% endif %}
</body>
</html>
